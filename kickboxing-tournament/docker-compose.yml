version: '3.8'

services:
  backend:
    image: ghcr.io/mx-angelaq/kickboxing-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_MODE=local
      - DATABASE_URL=sqlite:///./kickboxing_tournament.db
      - ADMIN_PASSWORD=admin123
      - STAFF_PASSWORD=staff123
      - SECRET_KEY=local-dev-secret-change-in-prod
      - CORS_ORIGINS=*
    volumes:
      - db-data:/app/data
    command: >
      sh -c "cd /app && python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: ghcr.io/mx-angelaq/kickboxing-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  db-data:
